<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Referee Card - حكم المباراة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A0E17 0%, #1a1f2e 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Landing Page */
        .landing-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .landing-content {
            text-align: center;
            max-width: 1200px;
        }

        .logo-animation {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        .logo-animation i:first-child {
            font-size: 80px;
            color: #00FF88;
            animation: bounce 2s infinite;
        }

        .card-stack {
            position: absolute;
            top: -20px;
            right: -30px;
            display: flex;
            gap: 5px;
        }

        .card-stack i {
            font-size: 30px;
            color: #FFD700;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .landing-title {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00FF88, #00B4FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .landing-title span {
            background: linear-gradient(135deg, #FF3366, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .landing-subtitle {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 50px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .feature {
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .feature:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.1);
        }

        .feature i {
            font-size: 48px;
            color: #00FF88;
            margin-bottom: 20px;
        }

        .feature h3 {
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .feature p {
            color: #aaa;
            font-size: 0.9rem;
        }

        .landing-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 40px 0;
        }

        .btn-primary, .btn-secondary {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00FF88, #00B4FF);
            color: #000;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-primary:hover, .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Auth Screens */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            max-width: 450px;
            width: 100%;
            padding: 40px;
            border-radius: 30px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 48px;
            color: #00FF88;
        }

        .logo h1 {
            font-size: 1.8rem;
            margin-top: 10px;
        }

        .logo h1 span {
            color: #00FF88;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i:first-child {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        .input-group input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00FF88;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
        }

        .forgot-link {
            color: #00FF88;
            text-decoration: none;
        }

        .auth-divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 30px);
            height: 1px;
            background: rgba(255,255,255,0.2);
        }

        .auth-divider::before { left: 0; }
        .auth-divider::after { right: 0; }

        .auth-divider span {
            background: transparent;
            padding: 0 15px;
            color: #aaa;
        }

        .btn-google {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: rgba(255,255,255,0.2);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #aaa;
        }

        .auth-footer a {
            color: #00FF88;
            text-decoration: none;
        }

        /* Game UI */
        .game-container {
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
        }

        .player-card {
            flex: 1;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .player-card.active {
            background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,180,255,0.2));
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }

        .player-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .player-score {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00FF88, #00B4FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .timer {
            font-size: 15vw;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-align: center;
            transition: all 0.3s ease;
        }

        .timer.green { color: #00FF88; text-shadow: 0 0 30px rgba(0,255,136,0.5); }
        .timer.yellow { color: #FFD700; text-shadow: 0 0 30px rgba(255,215,0,0.5); }
        .timer.red { color: #FF3366; text-shadow: 0 0 30px rgba(255,51,102,0.5); animation: pulse 0.5s infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .table-cards {
            text-align: center;
            margin: 30px 0;
        }

        .cards-count {
            font-size: 3rem;
            font-weight: bold;
            color: #FFD700;
        }

        .game-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn.start { background: linear-gradient(135deg, #00FF88, #00B4FF); color: #000; }
        .control-btn.reset { background: linear-gradient(135deg, #FF3366, #FF6B6B); color: #fff; }
        .control-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .difficulty-selector, .game-setup {
            text-align: center;
            margin: 20px;
        }

        select, input {
            padding: 10px 20px;
            margin: 0 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1f2e, #0A0E17);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .winner-buttons, .end-game-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .winner-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .winner-btn.player1 { background: linear-gradient(135deg, #00B4FF, #0080FF); color: #fff; }
        .winner-btn.player2 { background: linear-gradient(135deg, #FF3366, #FF6B6B); color: #fff; }
        .winner-btn.tie { background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; }

        /* Toast */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 10px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideInRight 0.3s ease;
            border-right: 4px solid;
        }

        .toast-success { border-right-color: #00FF88; }
        .toast-error { border-right-color: #FF3366; }
        .toast-info { border-right-color: #00B4FF; }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #00FF88;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .landing-title { font-size: 2rem; }
            .player-name { font-size: 1rem; }
            .player-score { font-size: 1.5rem; }
            .timer { font-size: 20vw; }
            .winner-buttons { flex-direction: column; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <div id="toast-container"></div>

    <script type="module">
        // Firebase Configuration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, sendEmailVerification, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup, updateProfile, reload } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfJU8NrKI7-GnQOj-e7AHETr9bJHbqI7s",
            authDomain: "referee-c4ba2.firebaseapp.com",
            projectId: "referee-c4ba2",
            storageBucket: "referee-c4ba2.firebasestorage.app",
            messagingSenderId: "409867345956",
            appId: "1:409867345956:web:52f2f495778a37c3b9f8b1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // Game State
        let currentScreen = 'landing';
        let gameState = {
            isPlaying: false,
            currentTimer: null,
            timeLeft: 0,
            currentDifficulty: 'normal',
            cardsOnTable: 2,
            player1Score: 0,
            player2Score: 0,
            currentRound: 1,
            totalCards: 52,
            player1Name: 'اللاعب 1',
            player2Name: 'اللاعب 2',
            gameHistory: []
        };

        const difficultySettings = {
            very_hard: { time: 5, name: 'صعب جداً' },
            hard: { time: 10, name: 'صعب' },
            normal: { time: 15, name: 'متوسط' },
            easy: { time: 20, name: 'سهل' }
        };

        // Helper Functions
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showLoading(show) {
            let loading = document.getElementById('custom-loading');
            if (!loading && show) {
                loading = document.createElement('div');
                loading.id = 'custom-loading';
                loading.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:10000';
                loading.innerHTML = '<div class="loading-spinner" style="width:50px;height:50px;"></div>';
                document.body.appendChild(loading);
            } else if (loading && !show) {
                loading.remove();
            }
        }

        function showScreen(screen) {
            currentScreen = screen;
            const app = document.getElementById('app');
            
            if (screen === 'landing') renderLanding();
            else if (screen === 'login') renderLogin();
            else if (screen === 'register') renderRegister();
            else if (screen === 'forgot') renderForgot();
            else if (screen === 'verify') renderVerifyEmail();
            else if (screen === 'game') renderGame();
            else if (screen === 'dashboard') renderDashboard();
        }

        // Render Functions
        function renderLanding() {
            document.getElementById('app').innerHTML = `
                <div class="landing-container">
                    <div class="landing-content">
                        <div class="logo-animation">
                            <i class="fas fa-futbol"></i>
                            <div class="card-stack">
                                <i class="fas fa-id-card"></i>
                                <i class="fas fa-id-card"></i>
                                <i class="fas fa-id-card"></i>
                            </div>
                        </div>
                        <h1 class="landing-title">Referee<span>Card</span></h1>
                        <p class="landing-subtitle">حكم المباراة الذكي لكروتك الحقيقية</p>
                        <div class="features-grid">
                            <div class="feature"><i class="fas fa-stopwatch"></i><h3>مؤقت دقيق</h3><p>تحكم كامل بالوقت حسب مستوى الصعوبة</p></div>
                            <div class="feature"><i class="fas fa-chart-line"></i><h3>نظام نقاط</h3><p>تتبع النقاط والإحصائيات بدقة</p></div>
                            <div class="feature"><i class="fas fa-trophy"></i><h3>سجل الأبطال</h3><p>تنافس وسجل انتصاراتك</p></div>
                        </div>
                        <div class="landing-buttons">
                            <button class="btn-primary btn-large" id="loginBtn">دخول</button>
                            <button class="btn-secondary btn-large" id="registerBtn">حساب جديد</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('loginBtn')?.addEventListener('click', () => showScreen('login'));
            document.getElementById('registerBtn')?.addEventListener('click', () => showScreen('register'));
        }

        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="auth-wrapper">
                    <div class="auth-card">
                        <div class="auth-header">
                            <div class="logo"><i class="fas fa-futbol"></i><h1>Referee<span>Card</span></h1></div>
                            <p class="tagline">مرحباً بعودتك</p>
                        </div>
                        <form id="loginForm">
                            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="البريد الإلكتروني" required></div>
                            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="كلمة المرور" required></div>
                            <div class="form-options">
                                <label class="checkbox"><input type="checkbox" id="rememberMe"><span>تذكرني</span></label>
                                <a href="#" id="forgotLink" class="forgot-link">نسيت كلمة المرور؟</a>
                            </div>
                            <button type="submit" class="btn-primary">دخول</button>
                        </form>
                        <div class="auth-divider"><span>أو</span></div>
                        <button id="googleLogin" class="btn-google"><i class="fab fa-google"></i> دخول بحساب Google</button>
                        <div class="auth-footer"><p>ليس لديك حساب؟ <a href="#" id="showRegister">إنشاء حساب جديد</a></p></div>
                    </div>
                </div>
            `;
            document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
            document.getElementById('googleLogin')?.addEventListener('click', handleGoogleLogin);
            document.getElementById('showRegister')?.addEventListener('click', (e) => { e.preventDefault(); showScreen('register'); });
            document.getElementById('forgotLink')?.addEventListener('click', (e) => { e.preventDefault(); showScreen('forgot'); });
        }

        function renderRegister() {
            document.getElementById('app').innerHTML = `
                <div class="auth-wrapper">
                    <div class="auth-card">
                        <div class="auth-header">
                            <div class="logo"><i class="fas fa-futbol"></i><h1>Referee<span>Card</span></h1></div>
                            <p class="tagline">انضم إلى المنافسة</p>
                        </div>
                        <form id="registerForm">
                            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="name" placeholder="الاسم الكامل" required></div>
                            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="البريد الإلكتروني" required></div>
                            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="كلمة المرور (6 أحرف)" required></div>
                            <div class="input-group"><i class="fas fa-check-circle"></i><input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required></div>
                            <button type="submit" class="btn-primary">إنشاء حساب</button>
                        </form>
                        <div class="auth-divider"><span>أو</span></div>
                        <button id="googleRegister" class="btn-google"><i class="fab fa-google"></i> التسجيل بـ Google</button>
                        <div class="auth-footer"><p>لديك حساب بالفعل؟ <a href="#" id="showLogin">تسجيل دخول</a></p></div>
                    </div>
                </div>
            `;
            document.getElementById('registerForm')?.addEventListener('submit', handleRegister);
            document.getElementById('googleRegister')?.addEventListener('click', handleGoogleLogin);
            document.getElementById('showLogin')?.addEventListener('click', (e) => { e.preventDefault(); showScreen('login'); });
        }

        function renderVerifyEmail() {
            const user = auth.currentUser;
            document.getElementById('app').innerHTML = `
                <div class="auth-wrapper">
                    <div class="auth-card">
                        <div class="auth-header">
                            <div class="logo"><i class="fas fa-envelope-open-text"></i><h1>تأكيد البريد<br>الإلكتروني</h1></div>
                        </div>
                        <div style="text-align:center; margin: 20px 0;">
                            <i class="fas fa-envelope" style="font-size: 64px; color: #FFD700;"></i>
                            <p style="margin: 20px 0;">تم إرسال رابط التأكيد إلى:</p>
                            <div style="background: rgba(0,255,136,0.1); padding: 15px; border-radius: 10px; color: #00FF88; font-weight: bold;">${user?.email || 'بريدك الإلكتروني'}</div>
                            <p style="margin: 20px 0; color: #FFD700;">⚠️ يرجى التحقق من بريدك الإلكتروني والضغط على رابط التأكيد</p>
                            <p style="margin: 10px 0; color: #aaa; font-size: 0.9rem;">✅ بعد تأكيد البريد، اضغط على "تم التأكيد"</p>
                        </div>
                        <button id="resendEmailBtn" class="btn-secondary" style="width:100%; margin-bottom: 10px;">🔄 إعادة إرسال رابط التأكيد</button>
                        <button id="checkVerifiedBtn" class="btn-primary" style="width:100%;">✅ تم التأكيد</button>
                        <button id="logoutFromVerifyBtn" class="btn-secondary" style="width:100%; margin-top: 10px; background: rgba(255,51,102,0.3);">🚪 تسجيل خروج</button>
                    </div>
                </div>
            `;
            document.getElementById('resendEmailBtn')?.addEventListener('click', async () => {
                if (user) {
                    showLoading(true);
                    try {
                        await sendEmailVerification(user);
                        showToast('تم إعادة إرسال رابط التأكيد بنجاح', 'success');
                    } catch (error) {
                        showToast('خطأ: ' + error.message, 'error');
                    }
                    showLoading(false);
                }
            });
            document.getElementById('checkVerifiedBtn')?.addEventListener('click', async () => {
                if (user) {
                    showLoading(true);
                    try {
                        await reload(user);
                        if (user.emailVerified) {
                            showToast('تم تأكيد بريدك! جاري التوجيه...', 'success');
                            setTimeout(() => showScreen('game'), 1500);
                        } else {
                            showToast('لم يتم تأكيد البريد بعد. يرجى التحقق من بريدك الإلكتروني والضغط على رابط التأكيد', 'error');
                        }
                    } catch (error) {
                        showToast('خطأ: ' + error.message, 'error');
                    }
                    showLoading(false);
                }
            });
            document.getElementById('logoutFromVerifyBtn')?.addEventListener('click', async () => {
                await signOut(auth);
                showScreen('login');
            });
        }

        function renderForgot() {
            document.getElementById('app').innerHTML = `
                <div class="auth-wrapper">
                    <div class="auth-card">
                        <div class="auth-header">
                            <div class="logo"><i class="fas fa-key"></i><h1>استعادة كلمة المرور</h1></div>
                        </div>
                        <form id="forgotForm">
                            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="البريد الإلكتروني" required></div>
                            <button type="submit" class="btn-primary">إرسال رابط الاستعادة</button>
                        </form>
                        <div class="auth-footer"><a href="#" id="backToLogin">العودة لتسجيل الدخول</a></div>
                    </div>
                </div>
            `;
            document.getElementById('forgotForm')?.addEventListener('submit', handleForgotPassword);
            document.getElementById('backToLogin')?.addEventListener('click', (e) => { e.preventDefault(); showScreen('login'); });
        }

        function renderGame() {
            document.getElementById('app').innerHTML = `
                <div class="game-container">
                    <div class="scoreboard">
                        <div class="player-card" id="player1-card"><div class="player-name" id="player1-name">${gameState.player1Name}</div><div class="player-score" id="player1-score">0</div></div>
                        <div class="player-card" id="player2-card"><div class="player-name" id="player2-name">${gameState.player2Name}</div><div class="player-score" id="player2-score">0</div></div>
                    </div>
                    <div class="timer-section"><div class="timer green" id="timer">0</div><div class="round-info">الجولة: <span id="round-number">1</span> | الكروت: <span id="cards-count">2</span></div></div>
                    <div class="table-cards"><div class="cards-count" id="table-cards">🎴 x2</div><div class="cards-label">الكروت على الطاولة</div></div>
                    <div class="game-controls"><button class="control-btn start" id="startGameBtn">بدء المباراة</button><button class="control-btn reset" id="resetGameBtn">إعادة ضبط</button><button class="control-btn" id="dashboardBtn">لوحة التحكم</button><button class="control-btn" id="logoutGameBtn">تسجيل خروج</button></div>
                    <div class="difficulty-selector"><label>مستوى الصعوبة:</label><select id="difficulty"><option value="very_hard">صعب جداً (5 ثواني)</option><option value="hard">صعب (10 ثواني)</option><option value="normal" selected>متوسط (15 ثانية)</option><option value="easy">سهل (20 ثانية)</option></select></div>
                    <div class="game-setup"><input type="number" id="totalCards" placeholder="عدد الكروت" value="52"><input type="text" id="player1NameInput" placeholder="اسم اللاعب 1" value="${gameState.player1Name}"><input type="text" id="player2NameInput" placeholder="اسم اللاعب 2" value="${gameState.player2Name}"></div>
                </div>
                <div id="winnerModal" class="modal"><div class="modal-content"><h2>من الفائز في هذه الجولة؟</h2><div class="winner-buttons"><button class="winner-btn player1" id="winnerPlayer1">${gameState.player1Name}</button><button class="winner-btn player2" id="winnerPlayer2">${gameState.player2Name}</button><button class="winner-btn tie" id="winnerTie">لا أحد</button></div></div></div>
                <div id="gameOverModal" class="modal"><div class="modal-content"><h2>🏆 نهاية المباراة 🏆</h2><div id="gameStats"></div><div class="end-game-buttons"><button class="control-btn start" id="rematchBtn">مباراة جديدة (نفس اللاعبين)</button><button class="control-btn reset" id="newGameBtn">مباراة جديدة (لاعبين جدد)</button></div></div></div>
            `;
            attachGameEvents();
        }

        function renderDashboard() {
            document.getElementById('app').innerHTML = `
                <div style="min-height: 100vh; padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 20px; margin-bottom: 30px; flex-wrap: wrap; gap: 10px;">
                        <div><i class="fas fa-futbol"></i> RefereeCard</div>
                        <div style="display: flex; gap: 10px;">
                            <button id="backToGameBtn" class="btn-primary" style="padding: 10px 20px;">رجوع للمباراة</button>
                            <button id="logoutDashboardBtn" class="btn-secondary" style="padding: 10px 20px;">تسجيل خروج</button>
                        </div>
                    </div>
                    <div id="dashboardContent" style="text-align: center;">جاري التحميل...</div>
                </div>
            `;
            loadDashboardData();
            document.getElementById('backToGameBtn')?.addEventListener('click', () => showScreen('game'));
            document.getElementById('logoutDashboardBtn')?.addEventListener('click', () => { signOut(auth); showScreen('login'); });
        }

        // Auth Handlers
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            showLoading(true);
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Force reload to check email verification status
                await reload(user);
                
                if (!user.emailVerified) {
                    showToast('⚠️ يرجى تأكيد بريدك الإلكتروني أولاً. تم إرسال رابط التأكيد مرة أخرى.', 'info');
                    await sendEmailVerification(user);
                    showScreen('verify');
                } else {
                    showToast('تم تسجيل الدخول بنجاح', 'success');
                    showScreen('game');
                }
            } catch (error) {
                let message = error.message;
                if (error.code === 'auth/invalid-credential') message = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
                else if (error.code === 'auth/user-not-found') message = 'لا يوجد حساب بهذا البريد';
                else if (error.code === 'auth/wrong-password') message = 'كلمة المرور غير صحيحة';
                showToast(message, 'error');
            }
            showLoading(false);
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) return showToast('كلمة المرور غير متطابقة', 'error');
            if (password.length < 6) return showToast('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
            
            showLoading(true);
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                await updateProfile(user, { displayName: name });
                
                await setDoc(doc(db, 'users', user.uid), {
                    name, email, createdAt: new Date(),
                    stats: { wins: 0, totalPoints: 0, matchesPlayed: 0, cardsWon: 0 }
                });
                
                // Send verification email
                await sendEmailVerification(user);
                
                showToast('✅ تم إنشاء الحساب بنجاح! تم إرسال رابط التأكيد إلى بريدك الإلكتروني', 'success');
                showScreen('verify');
                
            } catch (error) {
                let message = error.message;
                if (error.code === 'auth/email-already-in-use') message = 'هذا البريد الإلكتروني مستخدم بالفعل';
                else if (error.code === 'auth/invalid-email') message = 'البريد الإلكتروني غير صالح';
                showToast(message, 'error');
            }
            showLoading(false);
        }

        async function handleGoogleLogin() {
            showLoading(true);
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        name: user.displayName,
                        email: user.email,
                        createdAt: new Date(),
                        stats: { wins: 0, totalPoints: 0, matchesPlayed: 0, cardsWon: 0 }
                    });
                }
                
                showToast('تم تسجيل الدخول بنجاح', 'success');
                showScreen('game');
            } catch (error) {
                showToast(error.message, 'error');
            }
            showLoading(false);
        }

        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            showLoading(true);
            try {
                await sendPasswordResetEmail(auth, email);
                showToast('✅ تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني', 'success');
                setTimeout(() => showScreen('login'), 3000);
            } catch (error) {
                showToast(error.message, 'error');
            }
            showLoading(false);
        }

        // Game Functions
        function attachGameEvents() {
            document.getElementById('startGameBtn')?.addEventListener('click', startGame);
            document.getElementById('resetGameBtn')?.addEventListener('click', resetGame);
            document.getElementById('dashboardBtn')?.addEventListener('click', () => showScreen('dashboard'));
            document.getElementById('logoutGameBtn')?.addEventListener('click', () => { signOut(auth); showScreen('login'); });
            document.getElementById('winnerPlayer1')?.addEventListener('click', () => declareWinner('player1'));
            document.getElementById('winnerPlayer2')?.addEventListener('click', () => declareWinner('player2'));
            document.getElementById('winnerTie')?.addEventListener('click', () => declareWinner('tie'));
            document.getElementById('rematchBtn')?.addEventListener('click', rematch);
            document.getElementById('newGameBtn')?.addEventListener('click', newGame);
            document.getElementById('player1NameInput')?.addEventListener('change', (e) => { gameState.player1Name = e.target.value; document.getElementById('player1-name').textContent = e.target.value; });
            document.getElementById('player2NameInput')?.addEventListener('change', (e) => { gameState.player2Name = e.target.value; document.getElementById('player2-name').textContent = e.target.value; });
        }

        function startGame() {
            if (gameState.isPlaying) return;
            const difficulty = document.getElementById('difficulty').value;
            const totalCards = parseInt(document.getElementById('totalCards').value);
            gameState = {
                ...gameState,
                currentDifficulty: difficulty,
                totalCards,
                cardsOnTable: 2,
                player1Score: 0,
                player2Score: 0,
                currentRound: 1,
                isPlaying: true,
                gameHistory: []
            };
            updateUI();
            startCountdown();
        }

        function startCountdown() {
            let countdown = 3;
            const timer = setInterval(() => {
                document.getElementById('timer').textContent = countdown;
                if (countdown <= 1) {
                    clearInterval(timer);
                    startRoundTimer();
                }
                countdown--;
            }, 1000);
        }

        function startRoundTimer() {
            const timeLimit = difficultySettings[gameState.currentDifficulty].time;
            gameState.timeLeft = timeLimit;
            updateTimerDisplay();
            gameState.currentTimer = setInterval(() => {
                if (gameState.timeLeft <= 0) {
                    clearInterval(gameState.currentTimer);
                    endRound();
                } else {
                    gameState.timeLeft--;
                    updateTimerDisplay();
                    updateTimerColor();
                }
            }, 1000);
        }

        function updateTimerDisplay() { document.getElementById('timer').textContent = gameState.timeLeft; }
        
        function updateTimerColor() {
            const timer = document.getElementById('timer');
            const percentage = gameState.timeLeft / difficultySettings[gameState.currentDifficulty].time;
            timer.className = percentage > 0.5 ? 'timer green' : percentage > 0.2 ? 'timer yellow' : 'timer red';
            if (percentage <= 0.2 && navigator.vibrate) navigator.vibrate(200);
        }

        function endRound() {
            if (gameState.currentTimer) clearInterval(gameState.currentTimer);
            document.getElementById('winnerModal').style.display = 'flex';
        }

        function declareWinner(winner) {
            document.getElementById('winnerModal').style.display = 'none';
            if (winner === 'player1') {
                gameState.player1Score += gameState.cardsOnTable;
                gameState.gameHistory.push({ round: gameState.currentRound, winner: gameState.player1Name, points: gameState.cardsOnTable });
                gameState.cardsOnTable = 2;
            } else if (winner === 'player2') {
                gameState.player2Score += gameState.cardsOnTable;
                gameState.gameHistory.push({ round: gameState.currentRound, winner: gameState.player2Name, points: gameState.cardsOnTable });
                gameState.cardsOnTable = 2;
            } else {
                gameState.cardsOnTable += 2;
                gameState.gameHistory.push({ round: gameState.currentRound, winner: 'لا أحد', points: 0 });
            }
            gameState.currentRound++;
            const totalUsed = gameState.gameHistory.reduce((sum, r) => sum + (r.winner !== 'لا أحد' ? r.points : 0), 0);
            if (totalUsed >= gameState.totalCards) endGame();
            else { updateUI(); startCountdown(); }
        }

        function updateUI() {
            document.getElementById('player1-score').textContent = gameState.player1Score;
            document.getElementById('player2-score').textContent = gameState.player2Score;
            document.getElementById('round-number').textContent = gameState.currentRound;
            document.getElementById('cards-count').textContent = gameState.cardsOnTable;
            document.getElementById('table-cards').innerHTML = `🎴 x${gameState.cardsOnTable}`;
        }

        async function endGame() {
            gameState.isPlaying = false;
            if (gameState.currentTimer) clearInterval(gameState.currentTimer);
            const winner = gameState.player1Score > gameState.player2Score ? gameState.player1Name : gameState.player2Score > gameState.player1Score ? gameState.player2Name : 'تعادل';
            
            if (auth.currentUser) {
                try {
                    await addDoc(collection(db, 'matches'), {
                        userId: auth.currentUser.uid,
                        player1Name: gameState.player1Name,
                        player2Name: gameState.player2Name,
                        player1Score: gameState.player1Score,
                        player2Score: gameState.player2Score,
                        winner,
                        totalRounds: gameState.currentRound - 1,
                        difficulty: gameState.currentDifficulty,
                        date: serverTimestamp()
                    });
                    const userRef = doc(db, 'users', auth.currentUser.uid);
                    await updateDoc(userRef, {
                        'stats.matchesPlayed': increment(1),
                        'stats.totalPoints': increment(gameState.player1Score + gameState.player2Score),
                        'stats.cardsWon': increment(gameState.cardsOnTable)
                    });
                    if (winner !== 'تعادل') await updateDoc(userRef, { 'stats.wins': increment(1) });
                } catch (e) { console.error('Save error:', e); }
            }
            
            document.getElementById('gameStats').innerHTML = `
                <div style="margin: 10px 0;"><strong>🏆 الفائز:</strong> ${winner}</div>
                <div style="margin: 10px 0;"><strong>⭐ النتيجة:</strong> ${gameState.player1Name} ${gameState.player1Score} - ${gameState.player2Score} ${gameState.player2Name}</div>
                <div style="margin: 10px 0;"><strong>📊 عدد الجولات:</strong> ${gameState.currentRound - 1}</div>
            `;
            document.getElementById('gameOverModal').style.display = 'flex';
        }

        function resetGame() {
            if (gameState.currentTimer) clearInterval(gameState.currentTimer);
            gameState = {
                ...gameState,
                isPlaying: false,
                currentTimer: null,
                cardsOnTable: 2,
                player1Score: 0,
                player2Score: 0,
                currentRound: 1,
                gameHistory: []
            };
            updateUI();
            document.getElementById('timer').textContent = '0';
            document.getElementById('timer').className = 'timer green';
        }

        function rematch() {
            document.getElementById('gameOverModal').style.display = 'none';
            resetGame();
            startGame();
        }

        function newGame() {
            document.getElementById('gameOverModal').style.display = 'none';
            resetGame();
            document.getElementById('player1NameInput').value = 'اللاعب 1';
            document.getElementById('player2NameInput').value = 'اللاعب 2';
            gameState.player1Name = 'اللاعب 1';
            gameState.player2Name = 'اللاعب 2';
            updateUI();
        }

        async function loadDashboardData() {
            if (!auth.currentUser) return;
            try {
                const userDoc = await getDoc(doc(db, 'users', auth.currentUser.uid));
                const userData = userDoc.data();
                const q = query(collection(db, 'users'), orderBy('stats.wins', 'desc'), limit(10));
                const leaders = await getDocs(q);
                
                document.getElementById('dashboardContent').innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                        <div style="background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; text-align: center;"><i class="fas fa-trophy" style="font-size: 32px; color: #FFD700;"></i><h3 style="font-size: 2rem; margin: 10px 0;">${userData?.stats?.wins || 0}</h3><p>عدد الانتصارات</p></div>
                        <div style="background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; text-align: center;"><i class="fas fa-chart-line" style="font-size: 32px; color: #00FF88;"></i><h3 style="font-size: 2rem; margin: 10px 0;">${userData?.stats?.totalPoints || 0}</h3><p>إجمالي النقاط</p></div>
                        <div style="background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; text-align: center;"><i class="fas fa-calendar-alt" style="font-size: 32px; color: #00B4FF;"></i><h3 style="font-size: 2rem; margin: 10px 0;">${userData?.stats?.matchesPlayed || 0}</h3><p>عدد المباريات</p></div>
                        <div style="background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; text-align: center;"><i class="fas fa-id-card" style="font-size: 32px; color: #FF3366;"></i><h3 style="font-size: 2rem; margin: 10px 0;">${userData?.stats?.cardsWon || 0}</h3><p>الكروت التي ربحتها</p></div>
                    </div>
                    <div style="background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-top: 20px;">
                        <h2 style="margin-bottom: 20px;"><i class="fas fa-trophy"></i> 🏆 سجل الأبطال</h2>
                        ${leaders.docs.map((doc, idx) => `<div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);"><span><span style="font-size: 1.2rem;">${idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : idx + 1}</span> ${doc.data().name}</span><span style="color: #00FF88;">🏆 ${doc.data().stats?.wins || 0}</span></div>`).join('')}
                    </div>
                `;
            } catch(e) {
                document.getElementById('dashboardContent').innerHTML = '<p>حدث خطأ في تحميل البيانات</p>';
            }
        }

        // Auth State Listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Force reload to get fresh email verification status
                try { await reload(user); } catch(e) {}
                
                const isGoogleUser = user.providerData[0]?.providerId === 'google.com';
                
                if (!user.emailVerified && !isGoogleUser) {
                    if (currentScreen !== 'verify') {
                        showScreen('verify');
                    }
                } else if (user && (currentScreen === 'landing' || currentScreen === 'login' || currentScreen === 'register' || currentScreen === 'forgot')) {
                    showScreen('game');
                }
            } else if (currentScreen !== 'landing' && currentScreen !== 'login' && currentScreen !== 'register' && currentScreen !== 'forgot') {
                showScreen('landing');
            }
        });

        // Start App
        showScreen('landing');
    </script>
</body>
</html>
